<p style="color:#aaa;font-size:.85em;margin-bottom:24px">비밀번호를 입력해주세요</p>
<input id="pw-input" type="password" placeholder="비밀번호" style="width:100%;padding:14px 18px;border:2px solid #e0e0e8;border-radius:12px;font-size:1em;outline:none;text-align:center;transition:border-color .3s" onfocus="this.style.borderColor='#4f46e5'" onblur="this.style.borderColor='#e0e0e8'">
<div id="pw-error" style="color:#ef4444;font-size:.82em;margin-top:8px;height:20px"></div>
<button onclick="checkPw()" style="width:100%;padding:14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:12px;font-size:1em;font-weight:600;cursor:pointer;margin-top:4px;transition:opacity .3s" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">확인</button>

<script>
const PW_HASH='cc49091e6a3fa59a5d4f8f9d4a420ff47d7bfaabae08f666fe5d698712b1d326';
async function sha256(msg){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));return[...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('')}
async function checkPw(){const v=document.getElementById('pw-input').value;const h=await sha256(v);if(h===PW_HASH){document.getElementById('pw-screen').style.display='none';sessionStorage.setItem('authed','1')}else{document.getElementById('pw-error').textContent='비밀번호가 올바르지 않습니다';document.getElementById('pw-input').style.borderColor='#ef4444'}}
document.addEventListener('DOMContentLoaded',()=>{if(sessionStorage.getItem('authed')==='1'){document.getElementById('pw-screen').style.display='none'}document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkPw()})});
</script>

let currentCountry='korea',chartInstances={};
window._chartState={};

function switchCountry(c){if(c===currentCountry)return;currentCountry=c;document.querySelectorAll('.country-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.country-section').forEach(s=>s.classList.remove('active'));event.target.closest('.country-btn').classList.add('active');document.getElementById(c+'-section').classList.add('active');if(!document.getElementById(c+'-sisul-tab').innerHTML)initCountry(c)}
function switchSubTab(country,tab){const s=document.getElementById(country+'-section');s.querySelectorAll('.sub-tab-btn').forEach(b=>b.classList.remove('active'));s.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');document.getElementById(country+'-'+tab+'-tab').classList.add('active')}
function toggleDetail(id){
  const d=document.getElementById(id);
  const card=document.querySelector(`[data-detail="${id}"]`);
  const ps=d.closest('.tab-content').querySelectorAll('.detail-panel');
  const cs=d.closest('.tab-content').querySelectorAll('.card');
  if(d.classList.contains('show')){
    d.classList.remove('show');
    if(card)card.classList.remove('active-card');
  }else{
    ps.forEach(p=>p.classList.remove('show'));
    cs.forEach(c=>c.classList.remove('active-card'));
    d.classList.add('show');
    if(card)card.classList.add('active-card');
    
    // Render trend chart for this category
    const tabContent=d.closest('.tab-content');
    if(tabContent){
      const tabId=tabContent.id;
      const st=window._chartState[tabId];
      if(st){
        const idx=parseInt(id.split('-').pop());
        const cat=st.catNames[idx];
        if(cat)setTimeout(()=>renderTrendChart(id,st.data,cat,st.accentRgba),100);
      }
    }
  }
}
function fmt(v){if(v===0||v===null||v===undefined)return'<span style="color:#aaa">0%</span>';const c=v>0?'up':'down',a=v>0?'▲':'▼';return`<span class="${c}"><span class="arrow">${a}</span>${Math.abs(v).toFixed(1)}%</span>`}
function badgeClass(v){if(v>=30)return'hot';if(v>=10)return'warm';return'cool'}
function recoBadge(v){return`<span class="reco-badge ${badgeClass(v)}">${v>0?'+':''}${v.toFixed(1)}%</span>`}

function onFilterChange(tabId){
const st=window._chartState[tabId];if(!st)return;
const checks=document.querySelectorAll(`#${tabId}-filters input[type=checkbox]`);
st.active=new Set();
checks.forEach(cb=>{if(cb.checked)st.active.add(cb.value)});
if(st.active.size===0){checks[0].checked=true;st.active.add(checks[0].value)}
renderChart(tabId)}

function renderBars(items,ml){if(!items.length)return'';const mx=Math.max(...items.map(i=>i.s));let h=`<div class="bar-row" style="margin-bottom:10px;font-size:.75em;color:#aaa;font-weight:600"><div class="bar-name"></div><div class="bar-wrap" style="background:none"></div><div class="bar-metrics"><div class="bar-yoy">${ml}</div><div class="bar-mom">MoM</div></div></div>`;h+=items.map(i=>{const w=mx>0?(i.s/mx*100):0,cl=i.y>=0?'#10b981':'#ef4444';return`<div class="bar-row"><div class="bar-name" title="${i.n}">${i.n}</div><div class="bar-wrap"><div class="bar-fill" style="width:${w}%;background:${cl}55;border-left:3px solid ${cl}"></div></div><div class="bar-metrics"><div class="bar-yoy">${fmt(i.y)}</div><div class="bar-mom">${fmt(i.m)}</div></div></div>`}).join('');return h}
function renderTop3(items,ml){
  if(items.length<2)return'';
  const sm=[...items].filter(x=>x.s>0).sort((a,b)=>b.m-a.m);
  const gm=sm.filter(x=>x.m>0).slice(0,3);
  const dm=sm.filter(x=>x.m<0).sort((a,b)=>a.m-b.m).slice(0,3);
  let h='<div class="top3-grid"><div class="top3-box"><h4>📈 MoM 성장 Top 3</h4>';
  if(gm.length){gm.forEach(i=>{h+=`<div class="top3-item"><span>${i.n}</span>${fmt(i.m)}</div>`})}
  else{h+='<div class="top3-item" style="color:#aaa">해당 없음</div>'}
  h+='</div><div class="top3-box"><h4>📉 MoM 하락 Top 3</h4>';
  if(dm.length){dm.forEach(i=>{h+=`<div class="top3-item"><span>${i.n}</span>${fmt(i.m)}</div>`})}
  else{h+='<div class="top3-item" style="color:#aaa">해당 없음</div>'}
  h+='</div></div>';return h
}

function renderSection(tabId,data,catNames,accentRgba,mainLabel){
const container=document.getElementById(tabId);
catNames=[...catNames].filter(c=>data[c]).sort((a,b)=>data[b].items.reduce((s,i)=>s+i.s,0)-data[a].items.reduce((s,i)=>s+i.s,0));
window._chartState[tabId]={active:new Set(catNames),catNames,data,accentRgba,mainLabel};
const cc=['#6366f1','#ec4899','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316'];
let h=`<div class="overview-chart"><h2>카테고리별 SU 유입량 & 성장률 (2026.04)</h2><div class="chart-filters" id="${tabId}-filters"><span class="chart-filter-label">📊 차트 필터</span>`;
catNames.forEach(cat=>{h+=`<label><input type="checkbox" value="${cat}" checked onchange="onFilterChange('${tabId}')"><span>${cat}</span></label>`});
h+=`</div><div style="height:300px"><canvas id="${tabId}-overview"></canvas></div></div><div class="cards">`;
catNames.forEach((cat,idx)=>{const d=data[cat];if(!d)return;const m=d.metrics,id=tabId+'-'+idx;
h+=`<div class="card" data-detail="${id}" style="border-left-color:${cc[idx%cc.length]}" onclick="toggleDetail('${id}')"><div class="card-header"><span class="card-title">${cat}</span></div><div class="card-main-metric"><span class="card-main-label">YoY</span>${fmt(m.yoy)}</div><div class="card-sub-metrics"><div>MoM<span class="card-sub-value">${fmt(m.mom)}</span></div><div>QoQ<span class="card-sub-value">${fmt(m.hoh)}</span></div></div></div>`});
h+='</div>';
catNames.forEach((cat,idx)=>{const d=data[cat];if(!d)return;const id=tabId+'-'+idx;
h+=`<div class="detail-panel" id="${id}"><h3>${cat} — 상위 항목 (SU순, ${mainLabel} 변화율)</h3><div class="trend-chart-wrap" id="${id}-trend"><canvas id="${id}-trend-cv" height="160"></canvas></div>${renderBars(d.items.slice(0,15),mainLabel)}${renderTop3(d.items,mainLabel)}</div>`});
container.innerHTML=h;
setTimeout(()=>renderChart(tabId),150)}

function renderReco(country){const container=document.getElementById(country+'-reco-tab');
if(!container||!RECO_DATA[country])return;
const r=RECO_DATA[country];
const mt=MONTHLY_DATA[country];
const cc=['#6366f1','#ec4899','#f59e0b','#10b981','#ef4444','#8b5cf6','#06b6d4','#f97316'];

let h='<div style="margin-bottom:8px"><h2 style="font-size:1.3em;color:#1a1a2e">🔮 5~7월 추천 시술·수술</h2><p style="color:#888;font-size:.85em;margin-top:4px">작년 동기간(4~6월) 패턴 기반 · 3월 대비 성장률 · 국내 시술 SU≥200 수술 SU≥300 / 일본 시술·수술 SU≥50</p></div>';

// === Monthly Top Section ===
if(mt){
for(const[tab,label] of [['sisul','시술'],['susul','수술']]){
if(!mt[tab])continue;
h+=`<h3 style="font-size:1.1em;margin:20px 0 14px;color:#333">🏆 ${label} 월별 TOP 10</h3>`;
h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px">';
for(const[mkey,mlabel] of [['apr','5월'],['may','5월'],['jun','6월']]){
const items=mt[tab][mkey]||[];
h+=`<div style="background:#fff;border-radius:14px;padding:18px 20px;border:1px solid #e0e0e8"><h4 style="font-size:.95em;margin-bottom:12px;color:#333">${mlabel} 추천</h4>`;
items.forEach((i,idx)=>{
const v=i[mkey];const cls=v>=30?'hot':v>=10?'warm':'cool';
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f5;font-size:.82em"><div style="display:flex;align-items:center;gap:6px"><span style="color:#aaa;font-size:.75em;width:16px">${idx+1}</span><span style="font-weight:600">${i.n}</span><span style="color:#aaa;font-size:.72em">${i.c}</span></div><span class="reco-badge ${cls}">+${v.toFixed(1)}%</span></div>`;
});
h+='</div>';
}
h+='</div>';
}}

// === Category Section (existing) ===
let ci=0;
for(const[tab,label] of [['sisul','시술'],['susul','수술']]){
const cats=Object.keys(r[tab]);if(!cats.length)continue;
h+=`<h3 style="font-size:1.1em;margin:24px 0 14px;color:#333">📋 ${label} 카테고리별 추천</h3><div class="reco-wrap">`;
cats.forEach(cat=>{const items=r[tab][cat];if(!items||!items.length)return;const color=cc[ci%cc.length];ci++;
h+=`<div class="reco-cat"><div class="reco-cat-title"><span class="dot" style="background:${color}"></span>${cat}</div>`;
h+=`<div class="reco-item" style="border-bottom:2px solid #e8e8ee;padding-bottom:6px;margin-bottom:4px"><div class="reco-name" style="color:#aaa;font-weight:600;font-size:.78em">시술/수술명</div><div class="reco-months" style="font-size:.75em;color:#aaa"><span style="min-width:65px;text-align:center">5월</span><span style="min-width:65px;text-align:center">6월</span><span style="min-width:65px;text-align:center">7월</span></div><div class="reco-peak" style="color:#aaa;font-size:.75em">피크</div></div>`;
items.forEach(i=>{h+=`<div class="reco-item"><div class="reco-name">${i.n}</div><div class="reco-months">${recoBadge(i.apr)}${recoBadge(i.may)}${recoBadge(i.jun)}</div><div class="reco-peak">${i.pm}</div></div>`});
h+='</div>'});h+='</div>';}
container.innerHTML=h;return;;container.innerHTML=h}

function initCountry(c){const cfg=CAT_CONFIG[c],d=ALL_DATA[c];renderSection(c+'-sisul-tab',d.sisul,cfg.sisul,cfg.accent,cfg.mainLabel);renderSection(c+'-susul-tab',d.susul,cfg.susul,cfg.accent,cfg.mainLabel);if(cfg.hasReco)renderReco(c)}
function openPdfModal(){document.getElementById('pdfModal').classList.add('show');document.querySelectorAll('.pdf-country-item').forEach(el=>el.classList.remove('selected'));document.getElementById('pdfExportBtn').disabled=true}
function closePdfModal(){document.getElementById('pdfModal').classList.remove('show')}
function togglePdfCountry(el){el.classList.toggle('selected');document.getElementById('pdfExportBtn').disabled=document.querySelectorAll('.pdf-country-item.selected').length===0}
function toggleAllPdfCountries(){const items=document.querySelectorAll('.pdf-country-item');const allSel=document.querySelectorAll('.pdf-country-item.selected').length===items.length;items.forEach(el=>{if(allSel)el.classList.remove('selected');else el.classList.add('selected')});document.getElementById('pdfExportBtn').disabled=document.querySelectorAll('.pdf-country-item.selected').length===0}

function exportPdf(){
const selected=[...document.querySelectorAll('.pdf-country-item.selected')].map(el=>el.dataset.country);
if(!selected.length)return;
closePdfModal();

const showSisul=document.getElementById('pdfSisul').checked;
const showSusul=document.getElementById('pdfSusul').checked;
const showChart=document.getElementById('pdfChart').checked;
const showTrend=document.getElementById('pdfTrend').checked;
if(!showSisul&&!showSusul)return alert('시술 또는 수술 중 하나 이상 선택해주세요');

const names={korea:'🇰🇷 국내',japan:'🇯🇵 일본',thailand:'🇹🇭 태국',taiwan:'🇹🇼 대만',china:'🇨🇳 중국',english:'🇺🇸 영미'};

// Phase 1: Init uninitiated countries off-screen
const needInit=[];
selected.forEach(c=>{
  if(!document.getElementById(c+'-sisul-tab').innerHTML){
    needInit.push(c);
    const sec=document.getElementById(c+'-section');
    // Make visible off-screen so Chart.js gets proper canvas dimensions
    sec.style.cssText='display:block!important;position:absolute;left:-9999px;top:0;width:900px;visibility:visible;';
    // Activate tabs so chart containers are visible
    const sisul=document.getElementById(c+'-sisul-tab');
    const susul=document.getElementById(c+'-susul-tab');
    if(sisul){sisul.style.display='block';sisul.classList.add('active')}
    if(susul){susul.style.display='block';susul.classList.add('active')}
  }
});

// Init the countries now that sections are visible
needInit.forEach(c=>initCountry(c));

// Phase 2: Wait for Chart.js to render (needs animation frame + time)
setTimeout(()=>{
  // Render trend charts for newly initialized countries
  needInit.forEach(c=>{
    ['sisul','susul'].forEach(section=>{
      const tabId=c+'-'+section+'-tab';
      const cst=window._chartState[tabId];
      if(cst)cst.catNames.forEach((cat,idx)=>{
        renderTrendChart(tabId+'-'+idx,cst.data,cat,cst.accentRgba);
      });
    });
  });

  // Phase 3: Wait for trend charts too
  setTimeout(()=>{
    // Reset off-screen styles
    needInit.forEach(c=>{
      const sec=document.getElementById(c+'-section');
      sec.style.cssText='';
      const sisul=document.getElementById(c+'-sisul-tab');
      const susul=document.getElementById(c+'-susul-tab');
      if(sisul){sisul.style.display='';sisul.classList.remove('active')}
      if(susul){susul.style.display='';susul.classList.remove('active')}
    });

    // Phase 4: Set up print state for ALL selected countries
    selected.forEach((c,cidx)=>{
      const sec=document.getElementById(c+'-section');
      sec.classList.add('print-target');
      
      if(showSisul)document.getElementById(c+'-sisul-tab').classList.add('active');
      if(showSusul)document.getElementById(c+'-susul-tab').classList.add('active');
      
      sec.querySelectorAll('.detail-panel').forEach(p=>p.classList.add('show'));
      
      // Render trend charts for already-initialized countries too
      if(showTrend){
        ['sisul','susul'].forEach(section=>{
          if(section==='sisul'&&!showSisul)return;
          if(section==='susul'&&!showSusul)return;
          const tabId=c+'-'+section+'-tab';
          const cst=window._chartState[tabId];
          if(cst)cst.catNames.forEach((cat,idx)=>{
            renderTrendChart(tabId+'-'+idx,cst.data,cat,cst.accentRgba);
          });
        });
      }
      
      if(!showChart)sec.querySelectorAll('.overview-chart').forEach(o=>o.classList.add('print-hide'));
      if(!showTrend)sec.querySelectorAll('.trend-chart-wrap').forEach(w=>w.classList.add('print-hide'));
      
      const hdr=document.createElement('h2');
      hdr.className='print-country-header';
      hdr.textContent=names[c]||c;
      if(cidx>0)hdr.style.pageBreakBefore='always';
      sec.insertBefore(hdr,sec.firstChild);
    });

    // Phase 5: Print
    setTimeout(()=>{
      window.print();
      
      // Phase 6: Cleanup
      setTimeout(()=>{
        document.querySelectorAll('.country-section').forEach(s=>s.classList.remove('print-target'));
        document.querySelectorAll('.overview-chart,.trend-chart-wrap').forEach(el=>el.classList.remove('print-hide'));
        selected.forEach(c=>{
          const sec=document.getElementById(c+'-section');
          if(!sec)return;
          sec.querySelectorAll('.print-country-header').forEach(h=>h.remove());
          sec.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
          sec.querySelectorAll('.detail-panel').forEach(p=>p.classList.remove('show'));
        });
        const ab=document.querySelector('.country-btn.active');
        if(ab){
          const t=ab.textContent;
          switchCountry(t.includes('국내')?'korea':t.includes('일본')?'japan':t.includes('태국')?'thailand':t.includes('대만')?'taiwan':t.includes('중국')?'china':'english');
        }
      },500);
    },300);
  },500);
},600);
}

function renderTrendChart(panelId, data, cat, accentRgba){
  const cvId=panelId+'-trend-cv';
  const cv=document.getElementById(cvId);
  if(!cv||!data[cat])return;
  
  const items=data[cat].items.filter(i=>i.s>0);
  if(!items.length)return;
  
  const monthLabels=['25.4','25.5','25.6','25.7','25.8','25.9','25.10','25.11','25.12','26.1','26.2','26.3','26.4'];
  const totals=new Array(13).fill(0);
  items.forEach(item=>{
    if(item.v)item.v.forEach((val,mi)=>{if(mi<13)totals[mi]+=val});
  });
  
  const key=cvId;
  if(chartInstances[key])chartInstances[key].destroy();
  chartInstances[key]=new Chart(cv,{
    type:'line',
    data:{labels:monthLabels,datasets:[{
      label:cat+' 전체 SU',
      data:totals,
      borderColor:accentRgba+'0.85)',
      backgroundColor:'transparent',
      borderWidth:2.5,
      fill:false,
      tension:0,
      pointRadius:3,
      pointBackgroundColor:accentRgba+'0.85)',
      pointHoverRadius:5
    }]},
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:300},
      plugins:{
        legend:{display:false},
        datalabels:{display:false},
        tooltip:{callbacks:{
          label:function(ctx){
            const v=ctx.raw;
            return cat+': '+(v>=10000?(v/10000).toFixed(1)+'만':v>=1000?(v/1000).toFixed(1)+'천':v);
          }
        }}
      },
      scales:{
        x:{ticks:{font:{size:10},color:'#999'},grid:{display:false}},
        y:{display:false}
      }
    }
  });
}

initCountry('korea');
</script></body></html>
