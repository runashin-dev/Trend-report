function dlang(n){

  if(/[\u30A0-\u30FF\u3040-\u309F]/.test(n))return"JP";
  // Thai
  if(/[\u0E00-\u0E7F]/.test(n))return"TH";
  // Traditional Chinese (TW) - check for traditional-only characters and TW-specific words
  const twChars=/[臉額頭雙體點麗龍風鳥魚黃齒齡醫國學車門開關圖書應選邊還運過連達適際電預題類發復繼續線網義習聯覽觀試認調講負資質輕轉農遞錢鋼長錄閒難飛驗區華結競穩稱種積確監當異產環營準殘歸歲標換損據擔歷強張帶導層屬備壓報則寫對從個動後態]/;
  const twWords=/列印|臉部|雙眼皮|額頭|抽脂|縮小/;
  if(twChars.test(n)||twWords.test(n))return"TW";
  // Simplified Chinese (CN) - check for simplified-only characters and CN-specific words
  const cnChars=/[脸额头双体点丽龙风鸟鱼黄齿龄医国学车门开关图书应选边还运过连达适际电预题类发复继续线网义习联览观试认调讲负资质轻转农递钱钢长录闲难飞验区华结竞稳称种积确监当异产环营准残归岁标换损据担历强张带导层属备压报则写对从个动后态缩吸]/;
  const cnWords=/面部|吸脂|缩小|整形术/;
  if(cnChars.test(n)||cnWords.test(n))return"CN";
  // Any remaining CJK = CN default
  if(/[\u4E00-\u9FFF]/.test(n))return"CN";
  // English only
  if(/^[A-Za-z\s\d_,.\-'()]+$/.test(n.trim()))return"EN";
  if(/Elravie|Forehead|Endoscopic|Facial Lipo|Rhinoplasty|printing|Lifting|ONDA|Oligio|Ulthera/i.test(n)&&!/[가-힣]/.test(n))return"EN";
  return"KR";
}

      let t=`<div class="mom"><h4>${title}</h4><table class="MT"><thead><tr><th>구분</th>`;
      ms.forEach(m=>t+=`<th>${fM(m)}</th>`);t+=`<th>전월비</th></tr></thead><tbody>`;
      rows.forEach(([lb,vals,fmt,inv])=>{t+=`<tr><td>${lb}</td>`;vals.forEach((v,i)=>t+=`<td${i===S.L?' class="hl"':""}>${fmt(v)}</td>`);const l=vals[S.L],p=vals[S.P];t+=`<td>${p?(inv?bgInv:bg)((l-p)/p*100):""}</td></tr>`;});
      // Expandable detail rows (CPV/CPC split)
      if(detailId&&detailRows){
        const isOpen=S.momDetail.has(detailId);
        t+=`<tr><td colspan="${ms.length+2}" style="padding:4px 8px;border:none"><span onclick="toggleMomDetail('${detailId}')" style="font-size:10px;color:#6366f1;cursor:pointer;user-select:none">${isOpen?"▼ 채널별 접기":"▶ CPV / CPC 분리 보기"}</span></td></tr>`;
        if(isOpen){
          detailRows.forEach(([lb,vals,fmt,inv])=>{t+=`<tr style="background:#f9fafb"><td style="padding-left:20px;font-size:10px;color:#6b7280">${lb}</td>`;vals.forEach((v,i)=>t+=`<td${i===S.L?' class="hl"':""} style="font-size:10px;color:#6b7280">${fmt(v)}</td>`);const l=vals[S.L],p=vals[S.P];t+=`<td style="font-size:10px">${p?(inv?bgInv:bg)((l-p)/p*100):""}</td></tr>`;});
        }
      }
      return t+`</tbody></table></div>`;
    }
    h+=momT("📊 전체",[["조회수",tots.map(t=>t.v),fN],["총 DB",tots.map(t=>t.d),fN],["전환율",tots.map(t=>t.r),fP],["총 광고비",tots.map(t=>t.c),v=>"₩"+fN(v)],["DB당 투자비용",tots.map(t=>t.cpa),v=>"₩"+fN(v),1]],"total",[
      ["└ CPV DB당비용",cpvTots.map(t=>t.cpa),v=>"₩"+fN(v),1],
      ["└ CPC DB당비용",cpcTots.map(t=>t.cpa),v=>v>0?"₩"+fN(v):"-",1],
      ["└ CPV 광고비",cpvTots.map(t=>t.c),v=>"₩"+fN(v)],
      ["└ CPC 광고비",cpcTots.map(t=>t.tc),v=>"₩"+fN(v)],
      ["└ CPV DB",cpvTots.map(t=>t.d),fN],
      ["└ CPC DB",cpcTots.map(t=>t.cn),fN],
    ]);
    [...new Set(D.events.map(e=>e.l))].forEach(c=>{const cts=ms.map(m=>mTot(m,c));if(cts.every(t=>t.d===0))return;
      const cpvC=ms.map(m=>cpvMTot(m,c));
      h+=momT(`<span class="fl fl-${c}">${FL[c]||""}</span> ${CL[c]||c}`,[["조회수",cts.map(t=>t.v),fN],["DB",cts.map(t=>t.d),fN],["광고비",cts.map(t=>t.c),v=>"₩"+fN(v)],["DB당비용",cts.map(t=>t.cpa),v=>"₩"+fN(v),1]],"country_"+c,[
        ["└ CPV DB당비용",cpvC.map(t=>t.cpa),v=>"₩"+fN(v),1],
        ["└ CPV 광고비",cpvC.map(t=>t.c),v=>"₩"+fN(v)],
      ]);});
    h+=`<div class="st2">이벤트별 MOM (상위 10)</div>`;
    D.events.slice().sort((a,b)=>ms.reduce((s,m)=>(b.m[m]?b.m[m][1]:0)+s,0)-ms.reduce((s,m)=>(a.m[m]?a.m[m][1]:0)+s,0)).slice(0,10).forEach((ev,i)=>{
      const ets=ms.map(m=>evT(ev,m)),tr=autoTr(ev.n);
      const cpvEts=ms.map(m=>evCPV(ev,m)),cpcEts=ms.map(m=>evCPC(ev.n,m));
      let title=`<span class="fl fl-${ev.l}">${FL[ev.l]||""}</span> ${esc(ev.n.slice(0,40))}`;
      if(ev.l!=="KR"&&tr&&S.showTr)title+=` <span style="font-size:10px;color:#6366f1">(${esc(tr)})</span>`;
      h+=momT(title,[["조회수",ets.map(t=>t.v),fN],["DB",ets.map(t=>t.d),fN],["광고비",ets.map(t=>t.c),v=>"₩"+fN(v)],["DB당비용",ets.map(t=>t.cpa),v=>"₩"+fN(v),1]],"ev_"+i,[
        ["└ CPV DB당비용",cpvEts.map(t=>t.d>0?t.c/t.d:0),v=>v>0?"₩"+fN(v):"-",1],
        ["└ CPC DB당비용",cpcEts.map(t=>t.cn>0?t.tc/t.cn:0),v=>v>0?"₩"+fN(v):"-",1],
      ]);});
  }

  h+=`<div class="footer"><p>DB=CPV전환+CPC전환 · DB당투자비용=(CPV비용+CPC비용)÷총DB · 💾 자동 저장</p></div>`;
  document.getElementById("app").innerHTML=h;
  document.getElementById("pt")?.addEventListener("change",e=>{S.proj=e.target.checked;R();});
  document.getElementById("ce")?.addEventListener("change",e=>{S.cpvE=Math.max(1,+e.target.value);R();});
  document.getElementById("me")?.addEventListener("change",e=>{S.mktE=Math.max(1,+e.target.value);R();});
  document.getElementById("trToggle")?.addEventListener("change",e=>{S.showTr=e.target.checked;R();});
  setTimeout(rCh,80);
}

    S.ch.c2=new Chart(c2.getContext("2d"),{type:"line",data:{labels:lbs,datasets:[{label:"DB당 투자비용",data:tots.map(t=>t.cpa),borderColor:"#0891b2",backgroundColor:"rgba(8,145,178,.06)",borderWidth:3,pointRadius:5,pointBackgroundColor:"#0891b2",pointBorderColor:"#fff",pointBorderWidth:2,fill:true,tension:.3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...sty.tt,callbacks:{label:c=>"₩"+fN(c.parsed.y)}}},scales:{x:{grid:{display:false},ticks:{color:"#6b7280",font:{size:10}}},y:{grid:sty.grid,ticks:{...sty.tick,callback:v=>"₩"+fN(v)},min:Math.floor(mn/1000)*1000,max:Math.ceil(mx/1000)*1000}}}});}
  // Detail charts
  if(S.exp.size>0&&S.tab==="events"){

        if(cv){const ev=D.events[evIdx],dbs=ms.map(m=>evT(ev,m).d),cpas=ms.map(m=>evT(ev,m).cpa).filter(v=>v>0);

// ===== AI 랭킹 코멘트 생성 =====
// ===== 데이터 기반 자동 코멘트 생성 =====
function makeTopComment(ev,allEvs){
  const d=ev.cur.d,v=ev.cur.v,r=ev.cur.r,dG=ev.dG;
  const cvr=(r*100).toFixed(1);
  const avgD=allEvs.reduce((s,e)=>s+e.cur.d,0)/allEvs.length;
  const avgR=allEvs.reduce((s,e)=>s+e.cur.r,0)/allEvs.length;
  const parts=[];

  // DB 절대량
  if(d>=avgD*2) parts.push(`전체 평균 대비 ${(d/avgD).toFixed(1)}배 높은 DB ${d.toLocaleString()}건을 기록하며 최상위 성과를 유지하고 있습니다.`);
  else parts.push(`DB ${d.toLocaleString()}건으로 상위권 성과를 안정적으로 유지하고 있습니다.`);

  // 전환율
  if(r>avgR*1.3) parts.push(`전환율 ${cvr}%로 평균보다 높아 콘텐츠-수요 매칭이 우수합니다.`);
  else if(r<avgR*0.7) parts.push(`전환율 ${cvr}%는 개선 여지가 있어 썸네일·가격 강조 등 콘텐츠 보완을 권장합니다.`);

  // 성장률
  if(dG!==null){
    if(dG>=20) parts.push(`전월 대비 +${dG.toFixed(1)}% 성장하며 상승 모멘텀이 뚜렷합니다.`);
    else if(dG>=5) parts.push(`전월 대비 +${dG.toFixed(1)}% 소폭 성장 중입니다.`);
    else if(dG<=-20) parts.push(`전월 대비 ${dG.toFixed(1)}% 감소 추세이므로 이벤트 구성 점검이 필요합니다.`);
    else if(dG<0) parts.push(`전월 대비 ${dG.toFixed(1)}% 소폭 감소했으나 절대 DB량은 견조합니다.`);
    else parts.push(`전월 대비 DB가 안정적으로 유지되고 있습니다.`);
  }

  return parts.slice(0,2).join(" ");
}

function makeBotComment(ev,allEvs){
  const d=ev.cur.d,v=ev.cur.v,r=ev.cur.r,dG=ev.dG;
  const cvr=(r*100).toFixed(1);
  const avgR=allEvs.reduce((s,e)=>s+e.cur.r,0)/allEvs.length;
  const parts=[];

  // 조회수 vs DB 불균형 분석
  if(v>500&&d<=2){
    parts.push(`조회수 ${v.toLocaleString()}회에 비해 DB ${d}건으로 전환율이 매우 낮습니다. 가격·혜택 정보를 전면에 강조하거나 Before/After 콘텐츠를 보강해 전환 유도를 높여야 합니다.`);
  } else if(d===0){
    parts.push(`최신월 DB가 0건입니다. 이벤트 노출 여부 및 랜딩 페이지 상태를 우선 점검하고, 시즌 연관성이 낮다면 일시 중단 후 재기획을 고려하세요.`);
  } else {
    parts.push(`DB ${d.toLocaleString()}건으로 하위권에 해당합니다.`);
    if(r<avgR*0.5) parts.push(`전환율 ${cvr}%가 평균의 절반 이하로, 이벤트 제목·썸네일·혜택 구성 전면 개편이 필요합니다.`);
    else if(v<200) parts.push(`조회수 자체가 ${v.toLocaleString()}회로 낮아 노출 카테고리 및 키워드 재검토가 필요합니다.`);
    else parts.push(`이벤트 내용 차별화 또는 가격 경쟁력 검토가 권장됩니다.`);
  }

  // 성장 추세
  if(dG!==null&&dG<=-30) parts.push(`전월 대비 ${dG.toFixed(1)}% 급감하여 즉각적인 대응이 필요합니다.`);
  else if(dG!==null&&dG>=10) parts.push(`다만 전월 대비 +${dG.toFixed(1)}% 개선 중이므로 현 방향을 유지하며 콘텐츠를 강화하면 효과적입니다.`);

  return parts.slice(0,2).join(" ");
}
